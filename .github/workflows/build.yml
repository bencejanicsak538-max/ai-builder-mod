name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build
        run: gradle build --no-daemon

      - name: List build output
        run: ls -la build/libs/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-builder-mod
          path: |
            build/libs/ai-builder-3.0.0.jar
          if-no-files-found: error

      - name: Delete old latest release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AI Builder Mod v3.0.0 - Legfrissebb"
          body: |
            ## AI Builder Mod v3.0.0
            ### Telepites
            1. Toltsd le az `ai-builder-3.0.0.jar` fajlt
            2. Tedd a `.minecraft/mods/` mappaba
            3. Kell meg: Fabric Loader 0.16.10 + Fabric API 0.92.2+1.20.1
            4. Inditsd el, nyomd meg **B** gombot a beallitasokhoz

            ### Osszes parancs
            - `/ai <leiras>` - epites inditasa
            - `/aiversion` - verzio, modell, config info
            - `/aihelp` - osszes parancs listaja
            - `/aiundo` - utolso epites visszavonasa (max 5 szint)
            - `/aiundo list` - visszavonhato epitesek
            - `/aicancel` - aktiv epites leallitasa
            - `/aistatus` - folyamatban van-e epites
            - `/aihistory` - utolso 10 epites
            - `/aihistory rebuild <1-10>` - ujraepites history-bol
            - `/aistyle` - aktualis stilus megtekintese
            - `/aistyle medieval|modern|fantasy|nature|clear` - stilus beallitas
            - `/aidebug` - API latency, blokk stat, log
            - `/ailog` - raw JSON mentes fajlba
            - `/aidisplay` - progress kijelzo
            - `/aidisplay remove` - kijelzo eltavolitasa

            ### Ujdonsagok v3.0.0-ban
            - Teljesen ujrairt AI system prompt (strict JSON)
            - Verzioszam minden menuben latható
            - `/aiversion` parancs
            - `/aihelp` - teljes parancs lista
            - `/aihistory` + rebuild funkcio
            - `/aistyle` stilusbeallitas
            - `/aidebug` debug panel API latency-vel
            - `/ailog` raw JSON mentes
            - Jobb hibauzenetek es flood protection
          files: build/libs/ai-builder-3.0.0.jar
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
