name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-builder-mod
          path: build/libs/ai-builder-*.jar
          exclude: build/libs/*-sources.jar
          if-no-files-found: error

      - name: Delete old latest release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AI Builder Mod v2.0 - Legfrissebb"
          body: |
            ## AI Builder Mod v2.0
            ### Telepites
            1. Toltsd le az `ai-builder-2.0.0.jar` fajlt
            2. Tedd a `.minecraft/mods/` mappaba
            3. Kell meg: Fabric Loader 0.16.10 + Fabric API 0.92.2+1.20.1
            4. Inditsd el, nyomd meg **B** gombot a beallitasokhoz

            ### Parancsok
            - `/ai <leiras>` - epites inditasa
            - `/aiundo` - utolso epites visszavonasa (max 10 lepes)
            - `/aicancel` - aktiv epites leallitasa
            - `/aistatus` - folyamatban van-e epites

            ### Ujdonsagok v2.0-ban
            - Auto-retry 429/halozati hiba eseten
            - Flood protection (nem indithat 2 epitest egyszerre)
            - /aicancel parancs
            - Block state tamogatas
            - Jobb hibauzenetek
          files: build/libs/ai-builder-*.jar
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
